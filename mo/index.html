<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門監控面板 - 實時修復版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 核心樣式 */
        html, body { height: 100%; margin: 0; padding: 0; background: #0d1117; color: #c9d1d9; font-family: "PingFang HK", sans-serif; font-size: clamp(16px, 1.2vw + 12px, 24px); overflow: hidden; }
        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px 15px 5px; flex-shrink: 0; }
        h1 { margin: 0; font-size: 1.4rem; color: #58a6ff; }
        
        #actual-mini {
            display: flex; gap: 15px; background: rgba(88, 166, 255, 0.12);
            padding: 8px 20px; border-radius: 40px; border: 1px solid rgba(88, 166, 255, 0.3);
            font-size: 1.1rem; color: #f0f6fc; align-items: center;
        }
        #actual-mini img { height: 45px; width: auto; margin: 0 -5px; }

        .marquee-container { border: 1px solid #30363d; margin-bottom: 10px; height: 50px; overflow: hidden; display: flex; align-items: center; background: #1c232d; flex-shrink: 0; }
        .marquee-label { color: #0d1117; padding: 0 15px; font-weight: bold; font-size: 0.9rem; min-width: 110px; height: 100%; display: flex; align-items: center; }
        .marquee-stage { flex-grow: 1; height: 100%; position: relative; }
        .marquee-text { position: absolute; width: 100%; padding: 0 15px; font-size: 1rem; line-height: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.6s; }

        .traffic-bar { border-left: 5px solid #f2c94c; } .traffic-bar .marquee-label { background: #f2c94c; }
        .news-bar { border-left: 5px solid #d73a49; } .news-bar .marquee-label { background: #d73a49; color: #fff; }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; border-top: 4px solid #30363d; }
        
        .card-forecast { border-top-color: #79c0ff; }
        .card-warning { border-top-color: #f8e3a1; }
        .card-seven { border-top-color: #7ee787; }
        
        .alert-active { background: #ffffff !important; border: 4px solid #d73a49 !important; animation: pulse 2s infinite; }
        .alert-active h2, .alert-active .content { color: #d73a49 !important; font-weight: bold; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(215, 58, 73, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(215, 58, 73, 0); } 100% { box-shadow: 0 0 0 0 rgba(215, 58, 73, 0); } }

        .card-header { border-bottom: 1px solid #30363d; padding-bottom: 8px; margin-bottom: 10px; flex-shrink: 0; }
        .card-header h2 { font-size: 1.1rem; margin: 0; }
        .content { font-size: 0.95rem; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; flex-grow: 1; color: #d1d5db; }
        .time { font-size: 0.8rem; color: #8b949e; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-tower-broadcast"></i> 澳門資訊監控</h1>
        <div id="actual-mini">載入中...</div>
    </header>

    <div class="marquee-container traffic-bar">
        <div class="marquee-label">交通消息</div>
        <div class="marquee-stage"><div id="traffic-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div class="marquee-container news-bar">
        <div class="marquee-label">澳廣視新聞</div>
        <div class="marquee-stage"><div id="news-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div class="grid">
        <div class="card card-forecast" id="forecast-box"></div>
        <div class="card card-warning" id="warning-box"></div>
        <div class="card card-seven" id="seven-box"></div>
    </div>

<script>
    const feeds = [
        { id: "actual", url: "https://rss.smg.gov.mo/c_ActualWeather_rss.xml" },
        { id: "forecast", name: "天氣預測", url: "https://rss.smg.gov.mo/c_WForecast_rss.xml", icon: "fa-cloud-sun" },
        { id: "warning", name: "天氣警告", url: "https://rss.smg.gov.mo/c_WSignal_rss.xml", icon: "fa-triangle-exclamation" },
        { id: "seven", name: "七日預測", url: "https://rss.smg.gov.mo/c_WForecast7days_rss.xml", icon: "fa-calendar-week" },
        { id: "traffic", url: "https://dis.dsat.gov.mo:8017/traffic/xml/pn_rss.htm?language=tc" },
        { id: "news", url: "https://cdn2.tdm.com.mo/xml/rss/zh_news.xml" }
    ];

    const windMap = { "北": "N", "東北": "NE", "東": "E", "東南": "SE", "南": "S", "西南": "SW", "西": "W", "西北": "NW" };
    let trafficDataList = [], newsDataList = [];

    // 特定字詞刪除與隔行功能
    function processContent(id, text) {
        let clean = text.replace(/<[^>]*>/g, '').trim();
        clean = clean.replace(/(警告類型|最近更新時間|內容)\s*(：|:)?/g, "").trim();
        clean = clean.replace(/(\d+)\s*至\s*(\d+)/g, "$1 - $2");
        
        if (id === "warning") {
            const result = clean.replace(/沒有(熱帶氣旋|暴雨|季候風|雷暴|風暴潮|海嘯).*\n?/g, "").trim();
            return result === "" ? "現時沒有天氣警告" : result;
        }
        // 七日預測隔行：YYYY-MM-DD 前換行
        if (id === "seven") return clean.replace(/(\d{4}-\d{2}-\d{2})/g, "\n\n$1\n").trim();
        return clean;
    }

    // 實時天氣與圖示提取
    function parseActual(item) {
        const desc = item.querySelector("description").textContent;
        const iconMatch = desc.match(/ww-[a-zA-Z0-9]+\.gif/);
        const imgSrc = iconMatch ? `https://www.smg.gov.mo/icons/weatherIcon/${iconMatch[0]}` : "";
        const iconHtml = imgSrc ? `<img src="${imgSrc}" referrerpolicy="no-referrer">` : "";

        const clean = desc.replace(/<[^>]*>/g, '').replace(/：/g, ':');
        const getVal = (label) => {
            const reg = new RegExp(`${label}:\\s*([^\\n\\s°%km/h度]+)`);
            const match = clean.match(reg);
            return match ? match[1].trim() : '--';
        };

        return `
            <span><i class="fa-solid fa-thermometer"></i> ${getVal('溫度')}℃</span>
            ${iconHtml}
            <span><i class="fa-solid fa-droplet"></i> ${getVal('濕度')}%</span>
            <span><i class="fa-solid fa-wind"></i> ${windMap[getVal('風向')] || ''} ${getVal('風速')}km/h</span>
        `;
    }

    async function load() {
        for (const f of feeds) {
            try {
                // 使用 AllOrigins 繞過緩存
                const targetUrl = f.url + (f.url.includes('?') ? '&' : '?') + "nocache=" + Date.now();
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                
                const res = await fetch(proxyUrl, { cache: "no-store" });
                const xmlText = await res.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length === 0) continue;

                if (f.id === "traffic") {
                    trafficDataList = Array.from(items).map(i => ({
                        title: i.querySelector("title").textContent,
                        date: (i.querySelector("pubDate").textContent || "").split(' ')[4] || ""
                    }));
                } else if (f.id === "news") {
                    newsDataList = Array.from(items).map(i => ({ title: i.querySelector("title").textContent }));
                } else if (f.id === "actual") {
                    document.getElementById('actual-mini').innerHTML = parseActual(items[0]);
                } else {
                    const desc = items[0].querySelector("description").textContent;
                    const pubDate = items[0].querySelector("pubDate").textContent;
                    const content = processContent(f.id, desc);
                    const box = document.getElementById(`${f.id}-box`);
                    box.innerHTML = `
                        <div class="card-header"><h2><i class="fa-solid ${f.icon}"></i> ${f.name}</h2></div>
                        <div class="content">${content}</div>
                        <div class="time">🕒 ${pubDate}</div>
                    `;
                    (f.id === "warning" && content !== "現時沒有天氣警告") ? box.classList.add("alert-active") : box.classList.remove("alert-active");
                }
            } catch (e) { console.error(e); }
        }
    }

    function rotateList(list, elementId, currentIndexObj) {
        if (!list.length) return;
        const el = document.getElementById(elementId);
        el.style.opacity = "0"; el.style.transform = "translateY(-15px)";
        setTimeout(() => {
            currentIndexObj.index = (currentIndexObj.index + 1) % list.length;
            const item = list[currentIndexObj.index];
            el.innerText = (elementId === 'news-marquee') ? item.title : `${item.title} ${item.date}`;
            el.style.transform = "translateY(15px)";
            setTimeout(() => { el.style.opacity = "1"; el.style.transform = "translateY(0)"; }, 50);
        }, 600);
    }

    // 啟動
    load();
    setInterval(load, 60000);
    const tCounter = { index: 0 }, nCounter = { index: 0 };
    setInterval(() => rotateList(trafficDataList, 'traffic-marquee', tCounter), 10000);
    setTimeout(() => setInterval(() => rotateList(newsDataList, 'news-marquee', nCounter), 10000), 5000);
</script>
</body>
</html>
