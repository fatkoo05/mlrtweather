<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門實時氣象站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 500px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-info { text-align: center; margin-bottom: 30px; }
        .main-temp { font-size: 4rem; margin: 10px 0; font-weight: 200; color: #00d2ff; }
        .station-list { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 10px; }
        .station-item { display: grid; grid-template-columns: 1.5fr 1fr 1fr; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .station-item:last-child { border-bottom: none; }
        .status-msg { font-size: 0.8rem; text-align: center; color: #aaa; margin-top: 10px; }
        .loading-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-info">
        <div id="main-icon"><i class="fas fa-cloud-sun fa-3x"></i></div>
        <div class="main-temp" id="main-temp">--°</div>
        <div id="main-desc">同步中...</div>
        <div class="status-msg" id="status-msg">正在準備安全通道...</div>
    </div>

    <div class="station-list" id="station-list">
        <div style="text-align:center; padding: 20px;"><i class="fas fa-sync-alt loading-spin"></i> 正在尋找可用觀測站...</div>
    </div>
</div>

<script>
    // 解決 GitHub Pages CORS 的核心：使用特定的 CORS 代理
    const API_TARGET = "https://www.smg.gov.mo/static/data/actual_stations.json";
    const CORS_PROXY = "https://api.allorigins.win/get?url=";

    async function fetchData() {
        const msg = document.getElementById('status-msg');
        const list = document.getElementById('station-list');
        
        try {
            msg.innerText = "正在穿透 CORS 限制...";
            
            // 使用 allorigins 的 JSON 封裝模式，這在 GitHub Pages 上最穩定
            const response = await fetch(`${CORS_PROXY}${encodeURIComponent(API_TARGET + '?t=' + Date.now())}`);
            
            if (!response.ok) throw new Error("代理伺服器響應失敗");
            
            const wrapper = await response.json();
            // allorigins 會把原始數據放在 contents 欄位
            const data = JSON.parse(wrapper.contents);
            const stations = data.data || data;

            if (stations && stations.length > 0) {
                list.innerHTML = '';
                // 找到大潭山作為主顯示 (大潭山 ID 通常是 06)
                const mainStation = stations.find(s => s.station_name_cn.includes("大潭山")) || stations[0];
                
                document.getElementById('main-temp').innerText = (mainStation.temp || "--") + "°";
                document.getElementById('main-desc').innerText = "當前觀測：大潭山";
                
                stations.forEach(st => {
                    if(!st.temp) return;
                    const row = document.createElement('div');
                    row.className = 'station-item';
                    row.innerHTML = `
                        <div><strong>${st.station_name_cn}</strong></div>
                        <div style="color:#00d2ff">${st.temp}°C</div>
                        <div style="font-size:0.8rem; opacity:0.8">${st.wind_speed || 0} km/h</div>
                    `;
                    list.appendChild(row);
                });
                msg.innerText = "數據同步成功：" + new Date().toLocaleTimeString();
            }
        } catch (error) {
            console.error(error);
            msg.innerText = "同步失敗，可能是代理伺服器過載。";
            list.innerHTML = '<div style="text-align:center; padding:20px;">數據暫時無法顯示，請刷新頁面再試。</div>';
        }
    }

    fetchData();
    setInterval(fetchData, 300000); // 每 5 分鐘自動更新
</script>

</body>
</html>
