<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門監控面板 - 實時零延遲版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #0d1117; color: #c9d1d9;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            /* 響應式字體 */
            font-size: clamp(16px, 1.2vw + 12px, 24px); 
            overflow: hidden; 
        }

        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px 15px 5px; flex-shrink: 0; }
        h1 { margin: 0; font-size: 1.4rem; color: #58a6ff; letter-spacing: 1px; }
        
        #actual-mini {
            display: flex; gap: 20px; background: rgba(88, 166, 255, 0.12);
            padding: 5px 20px; border-radius: 40px; border: 1px solid rgba(88, 166, 255, 0.3);
            font-family: "Consolas", monospace; font-size: 1.1rem; color: #f0f6fc; font-weight: 600; 
            align-items: center;
        }

        #actual-mini img { height: 45px; width: auto; margin: 0 -5px; vertical-align: middle; }

        .marquee-container {
            border: 1px solid #30363d; margin-bottom: 10px; height: 50px; 
            overflow: hidden; display: flex; align-items: center; flex-shrink: 0;
        }
        .marquee-label {
            color: #0d1117; padding: 0 15px; font-weight: bold;
            font-size: 0.9rem; z-index: 5; height: 100%; display: flex; align-items: center; min-width: 110px;
        }
        .marquee-stage { flex-grow: 1; height: 100%; position: relative; background: #1c232d; }
        .marquee-text {
            position: absolute; width: 100%; padding: 0 15px;
            font-size: 1rem; font-weight: 500; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; opacity: 0; transform: translateY(50px); line-height: 50px;
        }

        .traffic-bar { border-left: 5px solid #f2c94c; }
        .traffic-bar .marquee-label { background: #f2c94c; }
        #traffic-marquee { color: #f2c94c; }

        .news-bar { border-left: 5px solid #d73a49; }
        .news-bar .marquee-label { background: #d73a49; color: #ffffff; }
        #news-marquee { color: #ff7b72; }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        
        @media (max-width: 1200px) { .grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) {
            html, body { overflow-y: auto; height: auto; }
            .grid { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            header { flex-direction: column; gap: 10px; }
        }

        .card { 
            background: #161b22; border: 1px solid #30363d; border-radius: 10px; 
            padding: 15px; display: flex; flex-direction: column; min-height: 0;
        }
        .card-warning.alert-active { background: #ffffff !important; border: 4px solid #d73a49 !important; animation: pulse-border 2s infinite; }
        .alert-active h2, .alert-active .content { color: #d73a49 !important; font-weight: bold; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(215, 58, 73, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(215, 58, 73, 0); }
            100% { box-shadow: 0 0 0 0 rgba(215, 58, 73, 0); }
        }

        .card-forecast { border-top: 4px solid #79c0ff; }
        .card-warning  { border-top: 4px solid #f8e3a1; }
        .card-seven    { border-top: 4px solid #7ee787; }

        .card-header { display: flex; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .card-header h2 { font-size: 1.1rem; margin: 0; color: #f0f6fc; }
        .content { font-size: 0.95rem; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; flex-grow: 1; color: #d1d5db; }
        .time { font-size: 0.8rem; color: #8b949e; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-tower-broadcast"></i> 澳門資訊監控</h1>
        <div id="actual-mini">讀取中...</div>
    </header>

    <div class="marquee-container traffic-bar">
        <div class="marquee-label"><i class="fa-solid fa-car"></i> 交通消息</div>
        <div class="marquee-stage"><div id="traffic-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div class="marquee-container news-bar">
        <div class="marquee-label"><i class="fa-solid fa-newspaper"></i> 澳廣視新聞</div>
        <div class="marquee-stage"><div id="news-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div id="board" class="grid">
        <div class="card card-forecast" id="forecast-box"></div>
        <div class="card card-warning" id="warning-box"></div>
        <div class="card card-seven" id="seven-box"></div>
    </div>

<script>
    const feeds = [
        { id: "actual", url: "https://rss.smg.gov.mo/c_ActualWeather_rss.xml" },
        { id: "forecast", name: "天氣預測", url: "https://rss.smg.gov.mo/c_WForecast_rss.xml", icon: "fa-cloud-sun" },
        { id: "warning", name: "天氣警告", url: "https://rss.smg.gov.mo/c_WSignal_rss.xml", icon: "fa-triangle-exclamation" },
        { id: "seven", name: "七日預測", url: "https://rss.smg.gov.mo/c_WForecast7days_rss.xml", icon: "fa-calendar-week" },
        { id: "traffic", url: "https://dis.dsat.gov.mo:8017/traffic/xml/pn_rss.htm?language=tc" },
        { id: "news", url: "https://cdn2.tdm.com.mo/xml/rss/zh_news.xml" }
    ];

    const windMap = { "北": "N", "東北": "NE", "東": "E", "東南": "SE", "南": "S", "西南": "SW", "西": "W", "西北": "NW" };
    let trafficDataList = [], newsDataList = [];

    // 直接解析 XML 中的數據
    function parseActual(doc) {
        const desc = doc.querySelector("description").textContent;
        const iconMatch = desc.match(/ww-[a-zA-Z0-9]+\.gif/);
        const imgSrc = iconMatch ? `https://www.smg.gov.mo/icons/weatherIcon/${iconMatch[0]}` : "";
        const iconHtml = imgSrc ? `<img src="${imgSrc}" referrerpolicy="no-referrer">` : "";

        const clean = desc.replace(/<[^>]*>/g, '').replace(/：/g, ':');
        const getVal = (label) => {
            const reg = new RegExp(`${label}:\\s*([^\\n\\s°%km/h度]+)`);
            const match = clean.match(reg);
            return match ? match[1].trim() : '--';
        };

        return `
            <span><i class="fa-solid fa-thermometer"></i> ${getVal('溫度')}℃</span>
            ${iconHtml}
            <span><i class="fa-solid fa-droplet"></i> ${getVal('濕度')}%</span>
            <span><i class="fa-solid fa-wind"></i> ${windMap[getVal('風向')] || ''} ${getVal('風速')}km/h</span>
        `;
    }

    function processContent(id, text) {
        let clean = text.replace(/<[^>]*>/g, '').trim();
        clean = clean.replace(/(警告類型|最近更新時間|內容)\s*(：|:)?/g, "").trim();
        if (id === "warning") {
            const result = clean.replace(/沒有(熱帶氣旋|暴雨|季候風|雷暴|風暴潮|海嘯).*\n?/g, "").trim();
            return result === "" ? "現時沒有天氣警告" : result;
        }
        return clean.replace(/(\d{4}-\d{2}-\d{2})/g, "\n\n$1\n").trim();
    }

async function load() {
        for (const f of feeds) {
            try {
                // 加強防緩存：
                // 1. 在 URL 加入隨機數防止代理緩存
                // 2. 在 Fetch 加入 cache: "no-cache" 防止瀏覽器緩存
                const cacheBuster = `nocache=${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                const finalUrl = f.url + (f.url.includes('?') ? '&' : '?') + cacheBuster;
                
                // 使用 AllOrigins 代理，並確保請求不被緩存
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(finalUrl)}`;
                
                const res = await fetch(proxyUrl, {
                    method: 'GET',
                    cache: 'no-cache', // 強制瀏覽器向伺服器發送請求
                    headers: {
                        'Pragma': 'no-cache',
                        'Cache-Control': 'no-cache'
                    }
                });

                const xmlText = await res.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // 檢查是否成功獲取 XML 內容
                const items = xmlDoc.querySelectorAll("item");
                if (items.length === 0) {
                    console.warn(`${f.id} 未能抓取到有效內容，可能是代理延遲`);
                    continue;
                }

                if (f.id === "traffic") {
                    trafficDataList = Array.from(items).map(i => ({
                        title: i.querySelector("title").textContent,
                        date: (i.querySelector("pubDate").textContent || "").split(' ')[4] || ""
                    }));
                    const el = document.getElementById('traffic-marquee');
                    el.innerText = `${trafficDataList[0].title} ${trafficDataList[0].date}`;
                } else if (f.id === "news") {
                    newsDataList = Array.from(items).map(i => ({
                        title: i.querySelector("title").textContent
                    }));
                    const el = document.getElementById('news-marquee');
                    el.innerText = newsDataList[0].title;
                } else if (f.id === "actual") {
                    document.getElementById('actual-mini').innerHTML = parseActual(items[0]);
                } else {
                    const desc = items[0].querySelector("description").textContent;
                    const pubDate = items[0].querySelector("pubDate").textContent;
                    const content = processContent(f.id, desc);
                    const box = document.getElementById(`${f.id}-box`);
                    
                    // 更新時間顯示以觀察是否有變化
                    box.innerHTML = `
                        <div class="card-header"><h2><i class="fa-solid ${f.icon}"></i> ${f.name}</h2></div>
                        <div class="content">${content}</div>
                        <div class="time">🕒 ${pubDate} (已更新)</div>
                    `;
                    
                    if (f.id === "warning" && content !== "現時沒有天氣警告") {
                        box.classList.add("alert-active");
                    } else {
                        box.classList.remove("alert-active");
                    }
                }
            } catch (e) { 
                console.error(`${f.id} 獲取失敗`, e); 
            }
        }
    }

    function rotateList(list, elementId, currentIndexObj) {
        if (!list.length) return;
        const el = document.getElementById(elementId);
        el.style.opacity = "0"; el.style.transform = "translateY(-40px)";
        setTimeout(() => {
            currentIndexObj.index = (currentIndexObj.index + 1) % list.length;
            const item = list[currentIndexObj.index];
            el.innerText = (elementId === 'news-marquee') ? item.title : `${item.title} ${item.date}`;
            el.style.transform = "translateY(40px)";
            setTimeout(() => { el.style.opacity = "1"; el.style.transform = "translateY(0px)"; }, 50);
        }, 600);
    }

    load();
    setInterval(load, 60000);
    const tCounter = { index: 0 }, nCounter = { index: 0 };
    setInterval(() => rotateList(trafficDataList, 'traffic-marquee', tCounter), 12000);
    setTimeout(() => setInterval(() => rotateList(newsDataList, 'news-marquee', nCounter), 12000), 6000);
</script>
</body>
</html>
